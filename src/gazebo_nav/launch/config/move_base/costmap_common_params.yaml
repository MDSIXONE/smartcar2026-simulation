# 通用代价地图参数（适用于 global_costmap 与 local_costmap）

# 建议优先使用 footprint（更精确），同时保留 robot_radius 可自动回退
footprint: [[0.15, -0.15], [0.15, 0.15],[-0.15, 0.15], [-0.15, -0.15]]
#robot_radius: 0.20   # 比实际略大一点，提高导航安全性

obstacle_layer:
  enabled: true
  combination_method: 1     # 1 表示取最大值
  track_unknown_space: true
  obstacle_range: 2.0       # 障碍探测半径（推荐保持 2m）
  raytrace_range: 2.0       # 清除障碍的射线距离（略小于原来的3.0）
  observation_sources: laser_scan_sensor
  laser_scan_sensor:
    sensor_frame: laser_frame
    data_type: LaserScan
    topic: scan
    marking: true
    clearing: true
    inf_is_valid: true

inflation_layer:
  enabled: true
  cost_scaling_factor: 4.0      # 控制膨胀衰减速率，数值越大下降越快（适度）
  inflation_radius: 0.25        # 增大膨胀半径，便于安全绕障，默认 0.05 太小

static_layer:
  enabled: true

