GlobalPlanner:
  allow_unknown: true
  default_tolerance: 0.2
  visualize_potential: false
  use_dijkstra: false
  use_quadratic: true          # 使用二次近似，提高计算效率
  use_grid_path: true          # 保持网格路径，如需更光滑可设为 false
  old_navfn_behavior: false

  lethal_cost: 253
  neutral_cost: 50             # 稍微降低中性代价，提升规划灵活性
  cost_factor: 0.55
  publish_potential: false     # 关闭发布，减少CPU消耗

  orientation_mode: 0
  orientation_window_size: 1

