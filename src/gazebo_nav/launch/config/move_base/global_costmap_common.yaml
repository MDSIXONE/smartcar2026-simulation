# Use the same physical collision envelope as the laser rollout controller.
# A larger global-only footprint can declare the robot's current cell lethal
# after a valid narrow-lane turn, leaving GlobalPlanner unable to replan from
# the pose that CymPlanner safely reached.
footprint: [[0.15, -0.10], [0.15, 0.10], [-0.15, 0.10], [-0.15, -0.10]]
footprint_padding: 0.0
transform_tolerance: 0.5

static_layer:
  enabled: true
  map_topic: /map
  subscribe_to_updates: true

# Keep dynamic laser obstacles in the global map as well.  CymPlanner returns
# false for a blocked segment, so GlobalPlanner must see the same obstacle when
# move_base asks it for a replacement path.
obstacle_layer:
  enabled: true
  combination_method: 1
  track_unknown_space: false
  obstacle_range: 3.0
  raytrace_range: 4.0
  observation_sources: laser_scan_sensor
  laser_scan_sensor:
    sensor_frame: laser_link
    data_type: LaserScan
    topic: /scan
    marking: true
    clearing: true
    inf_is_valid: true

inflation_layer:
  enabled: true
  inflation_radius: 0.23
  cost_scaling_factor: 0.05
