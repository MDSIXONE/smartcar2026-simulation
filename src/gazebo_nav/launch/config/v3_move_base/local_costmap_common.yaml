# Keep the local collision model compact enough for the narrow simulated lanes.
# The global costmap retains its larger safety footprint for route planning.
footprint: [[0.15, -0.10], [0.15, 0.10], [-0.15, 0.10], [-0.15, -0.10]]
footprint_padding: 0.0
transform_tolerance: 0.3

obstacle_layer:
  enabled: true
  combination_method: 1
  track_unknown_space: false
  obstacle_range: 3.0
  raytrace_range: 4.0
  observation_sources: laser_scan_sensor
  laser_scan_sensor:
    sensor_frame: laser_link
    data_type: LaserScan
    topic: /scan
    marking: true
    clearing: true
    inf_is_valid: true

inflation_layer:
  enabled: true
  inflation_radius: 0.07
  cost_scaling_factor: 4.0
