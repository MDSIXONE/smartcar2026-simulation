joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 50

arm_controller:
  type: position_controllers/JointTrajectoryController
  joints:
    - arm_joint1
    - arm_joint2
    - arm_joint3
    - arm_joint4
    - arm_joint5
  gains:
    arm_joint1: {p: 150.0, i: 0.05, d: 30.0}
    arm_joint2: {p: 200.0, i: 0.05, d: 40.0}
    arm_joint3: {p: 180.0, i: 0.05, d: 35.0}
    arm_joint4: {p: 250.0, i: 0.05, d: 50.0}
    arm_joint5: {p: 120.0, i: 0.02, d: 30.0}
  constraints:
    goal_time: 0.5
    stopped_velocity_tolerance: 0.01
    arm_joint1: {trajectory: 0.1, goal: 0.01}
    arm_joint2: {trajectory: 0.1, goal: 0.01}
    arm_joint3: {trajectory: 0.1, goal: 0.01}
    arm_joint4: {trajectory: 0.1, goal: 0.01}
    arm_joint5: {trajectory: 0.1, goal: 0.01}

gripper_controller:
  type: position_controllers/JointPositionController
  joint: r_joint
  pid: {p: 30.0, i: 0.01, d: 20.0}
