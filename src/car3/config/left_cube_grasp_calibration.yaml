target_region: left
observed_model: cube_2

# Vehicle and target position at the calibrated grasp pose.
car_pose:
  x: -1.652033
  y: -0.590687
  yaw: 3.141157
left_cube_pose:
  x: -1.971310
  y: -0.589916
  z: 0.020000

# Signed offsets, defined as target minus reference, in metres.
relative_offset:
  car_to_cube_x: -0.319277
  car_to_cube_y: 0.000771
  tcp_to_cube_x: -0.004001
  tcp_to_cube_y: 0.000810
  tcp_to_cube_z: -0.003012

# This is the near-grasp posture; the TCP is aligned with the cube before closing.
left_cube_grasp_pose: [-0.0001, 1.5000, 0.2800, 1.3000, 0.0000]
